baseURL = "https://www.cybersecurityos.net"
languageCode = "en-us"
title = "CybersecurityOS"
theme = "ananke"
enableGitInfo = true

# SEO Metadata
description = "Weekly security intelligence, mental models, and leadership frameworks for security engineers, CISOs, and the next generation of cyber leaders — written by a practicing Deputy CISO."
keywords = "cybersecurity, security leadership, CISO frameworks, security engineering, threat intelligence, AI security, DevSecOps, mental models, cyber risk management"
author = "Michael Tayo"
# To enable Google Analytics add your tracking ID:
# [services.googleAnalytics]
#   id = "G-XXXXXXXXXX"

# Taxonomies: add social taxonomy to address deprecation of .Site.Social
[taxonomies]
  tag = "tags"
  category = "categories"
  social = "social"

# Params (Optional: Adjust as needed based on your theme)
[params]
  env = "production"
  favicon = "images/c-os-l.svg"   # Path to your favicon
  site_logo = "images/c-os.svg"
  showSocialLinks = true        # Show social links in the footer (if supported by the theme)
  paginate = 20
  rss = "index.xml" #rss
  show_reading_time = true

[params.social]
  linkedin = "https://www.linkedin.com/company/cybershieldacademy/" #linkedin
  twitter = 'cyb3rshi3ld'
  
# Menu Configuration (Optional: Customize navigation)
[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 1

[[menu.main]]
  name = "Posts"
  url = "/posts/"
  weight = 2

[[menu.main]]
  name = "Docs"
  url = "/docs/"
  weight = 3


 [[menu.main]]
  name = "Search"
  url = "/search/"
  weight = 4

[[menu.main]]
  name = "Contact"
  url = "/contact/"
  weight = 5

[[menu.main]]
  name = "Membership"
  url = "https://cybersecurityos.gumroad.com/l/os-member"
  weight = 6

# Image processing pipeline (WebP conversion, quality, EXIF stripping)
[imaging]
  quality = 85
  resampleFilter = "Lanczos"

[imaging.exif]
  includeFields = ""
  excludeFields = ".*"
  disableDate = true
  disableLatLong = true

# Sitemap
[sitemap]
  changefreq = "weekly"
  filename   = "sitemap.xml"
  priority   = 0.5

[services]
  [services.disqus]
    shortname = 'https-www-cybersecurityos-net'