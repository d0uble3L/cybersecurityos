<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#130a1e"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a0a2e" stroke-width="0.7"/>
    </pattern>
    <linearGradient id="redglow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <rect width="800" height="420" fill="url(#bg)"/>
  <rect width="800" height="420" fill="url(#grid)"/>

  <!-- Top accent -->
  <rect x="0" y="0" width="800" height="4" fill="url(#redglow)"/>

  <!-- Left bar -->
  <rect x="52" y="56" width="4" height="254" rx="2" fill="#ef4444"/>

  <!-- Category chip -->
  <rect x="72" y="56" width="176" height="22" rx="11" fill="#1a0520" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="71" text-anchor="middle" font-size="9.5" fill="#ef4444" letter-spacing="2" font-weight="600">AI INCIDENT RESPONSE</text>
  <text x="258" y="71" font-size="9.5" fill="#5a3a6a" letter-spacing="1">JUL 20, 2026</text>

  <!-- Title -->
  <text x="72" y="128" font-size="24" font-weight="800" fill="#f0e8ff" letter-spacing="-0.5">The Real Scandal in the</text>
  <text x="72" y="162" font-size="24" font-weight="800" fill="#f0e8ff" letter-spacing="-0.5">Hugging Face Breach Isn't</text>
  <text x="72" y="196" font-size="24" font-weight="800" fill="#ef4444" letter-spacing="-0.5">the Hacker</text>

  <!-- Divider -->
  <rect x="72" y="222" width="280" height="2" rx="1" fill="#2a1040"/>

  <!-- Subtitle -->
  <text x="72" y="250" font-size="13.5" fill="#9a7ab8">It's who you can't call at 2AM.</text>

  <!-- Tags -->
  <rect x="72" y="272" width="96" height="22" rx="11" fill="#110520" stroke="#ef4444" stroke-width="1"/>
  <text x="120" y="287" text-anchor="middle" font-size="10" fill="#ef4444">Autonomous Agents</text>

  <rect x="176" y="272" width="118" height="22" rx="11" fill="#110520" stroke="#a855f7" stroke-width="1"/>
  <text x="235" y="287" text-anchor="middle" font-size="10" fill="#a855f7">AI Safety Guardrails</text>

  <!-- Branding -->
  <text x="72" y="388" font-size="11" fill="#2a1040" letter-spacing="2.5">CYBERSECURITYOS.NET</text>

  <!-- Right: stat cards -->
  <rect x="476" y="58" width="256" height="70" rx="7" fill="#0f0520" stroke="#ef4444" stroke-width="1"/>
  <rect x="476" y="58" width="4" height="70" fill="#ef4444"/>
  <text x="490" y="77" font-size="8" fill="#ef4444" letter-spacing="1" font-weight="700">AGENT ACTIONS LOGGED</text>
  <text x="490" y="107" font-size="28" fill="#ef4444" font-weight="900" letter-spacing="-1">17,000+</text>
  <text x="605" y="107" font-size="9.5" fill="#7a5a8a">across one weekend</text>

  <rect x="476" y="138" width="256" height="70" rx="7" fill="#0f0520" stroke="#a855f7" stroke-width="1"/>
  <rect x="476" y="138" width="4" height="70" fill="#a855f7"/>
  <text x="490" y="157" font-size="8" fill="#a855f7" letter-spacing="1" font-weight="700">FRONTIER MODELS</text>
  <text x="490" y="182" font-size="15.5" fill="#f0e8ff" font-weight="700">Refused forensic analysis</text>
  <text x="490" y="200" font-size="9.5" fill="#7a5a8a">blocked by safety guardrails</text>

  <rect x="476" y="218" width="256" height="70" rx="7" fill="#0f0520" stroke="#f59e0b" stroke-width="1"/>
  <rect x="476" y="218" width="4" height="70" fill="#f59e0b"/>
  <text x="490" y="237" font-size="8" fill="#f59e0b" letter-spacing="1" font-weight="700">WHAT WORKED</text>
  <text x="490" y="262" font-size="18" fill="#f0e8ff" font-weight="800">GLM 5.2</text>
  <text x="490" y="279" font-size="9.5" fill="#7a5a8a">Chinese open-weight, self-hosted</text>

  <rect x="476" y="298" width="256" height="70" rx="7" fill="#0f0520" stroke="#10b981" stroke-width="1"/>
  <rect x="476" y="298" width="4" height="70" fill="#10b981"/>
  <text x="490" y="317" font-size="8" fill="#10b981" letter-spacing="1" font-weight="700">THE GAP</text>
  <text x="490" y="342" font-size="13" fill="#f0e8ff" font-weight="600">Attacked, defended, blocked</text>
  <text x="490" y="360" font-size="9.5" fill="#7a5a8a">all by AI. No plan for it.</text>
</svg>
