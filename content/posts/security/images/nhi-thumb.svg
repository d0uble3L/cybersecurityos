<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050c1a"/>
      <stop offset="100%" stop-color="#0c1f3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0e2440" stroke-width="0.7"/>
    </pattern>
  </defs>

  <rect width="800" height="420" fill="url(#bg)"/>
  <rect width="800" height="420" fill="url(#grid)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="800" height="4" fill="url(#accent)"/>

  <!-- Left bar -->
  <rect x="52" y="56" width="4" height="254" rx="2" fill="#6366f1"/>

  <!-- Category chip -->
  <rect x="72" y="56" width="130" height="22" rx="11" fill="#0d1a3a" stroke="#6366f1" stroke-width="1"/>
  <text x="137" y="71" text-anchor="middle" font-size="9.5" fill="#6366f1" letter-spacing="2" font-weight="600">IDENTITY SECURITY</text>

  <!-- Beginner guide badge -->
  <rect x="210" y="56" width="90" height="22" rx="11" fill="#0d1a3a" stroke="#8b5cf6" stroke-width="1"/>
  <text x="255" y="71" text-anchor="middle" font-size="9.5" fill="#8b5cf6" letter-spacing="1.5" font-weight="600">101 GUIDE</text>

  <!-- Title -->
  <text x="72" y="132" font-size="28" font-weight="800" fill="#e8f4ff" letter-spacing="-0.5">What Is a</text>
  <text x="72" y="170" font-size="28" font-weight="800" fill="#e8f4ff" letter-spacing="-0.5">Non-Human</text>
  <text x="72" y="208" font-size="28" font-weight="800" fill="#6366f1" letter-spacing="-0.5">Identity?</text>

  <!-- Divider -->
  <rect x="72" y="226" width="260" height="2" rx="1" fill="#1a3a5a"/>

  <!-- Subtitle -->
  <text x="72" y="254" font-size="13.5" fill="#7aaece">Machines now outnumber humans.</text>
  <text x="72" y="272" font-size="13.5" fill="#7aaece">Are you securing both?</text>

  <!-- Tags -->
  <rect x="72" y="296" width="68" height="22" rx="11" fill="#051828" stroke="#f59e0b" stroke-width="1"/>
  <text x="106" y="311" text-anchor="middle" font-size="10" fill="#f59e0b">NHI</text>

  <rect x="148" y="296" width="110" height="22" rx="11" fill="#051828" stroke="#6366f1" stroke-width="1"/>
  <text x="203" y="311" text-anchor="middle" font-size="10" fill="#6366f1">Machine Identity</text>

  <rect x="266" y="296" width="82" height="22" rx="11" fill="#051828" stroke="#10b981" stroke-width="1"/>
  <text x="307" y="311" text-anchor="middle" font-size="10" fill="#10b981">AI Agents</text>

  <!-- Branding -->
  <text x="72" y="388" font-size="11" fill="#1e3d56" letter-spacing="2.5">CYBERSECURITYOS.NET</text>

  <!-- Right: identity type cards -->
  <rect x="476" y="58" width="256" height="62" rx="7" fill="#071528" stroke="#f59e0b" stroke-width="1"/>
  <rect x="476" y="58" width="4" height="62" fill="#f59e0b"/>
  <text x="490" y="78" font-size="8" fill="#f59e0b" letter-spacing="1" font-weight="700">SERVICE ACCOUNTS</text>
  <text x="490" y="98" font-size="12" fill="#f0f6ff" font-weight="600">Automated system access</text>
  <text x="490" y="113" font-size="9" fill="#5a8aa8">often over-permissioned</text>

  <rect x="476" y="130" width="256" height="62" rx="7" fill="#071528" stroke="#ef4444" stroke-width="1"/>
  <rect x="476" y="130" width="4" height="62" fill="#ef4444"/>
  <text x="490" y="150" font-size="8" fill="#ef4444" letter-spacing="1" font-weight="700">API KEYS &amp; TOKENS</text>
  <text x="490" y="170" font-size="12" fill="#f0f6ff" font-weight="600">Static secrets in codebases</text>
  <text x="490" y="185" font-size="9" fill="#5a8aa8">rarely rotated</text>

  <rect x="476" y="202" width="256" height="62" rx="7" fill="#071528" stroke="#6366f1" stroke-width="1"/>
  <rect x="476" y="202" width="4" height="62" fill="#6366f1"/>
  <text x="490" y="222" font-size="8" fill="#6366f1" letter-spacing="1" font-weight="700">AI AGENTS</text>
  <text x="490" y="242" font-size="12" fill="#f0f6ff" font-weight="600">Fastest-growing identity class</text>
  <text x="490" y="257" font-size="9" fill="#5a8aa8">act autonomously on your systems</text>

  <rect x="476" y="274" width="256" height="62" rx="7" fill="#071528" stroke="#10b981" stroke-width="1"/>
  <rect x="476" y="274" width="4" height="62" fill="#10b981"/>
  <text x="490" y="294" font-size="8" fill="#10b981" letter-spacing="1" font-weight="700">IOT &amp; DEVICE IDENTITIES</text>
  <text x="490" y="314" font-size="12" fill="#f0f6ff" font-weight="600">Embedded, hard to audit</text>
  <text x="490" y="329" font-size="9" fill="#5a8aa8">often forgotten after deployment</text>

  <!-- Stat callout -->
  <rect x="476" y="346" width="256" height="46" rx="7" fill="#0d1a2e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="604" y="364" text-anchor="middle" font-size="11" fill="#8b5cf6" font-weight="700">45× more machine identities</text>
  <text x="604" y="382" text-anchor="middle" font-size="9.5" fill="#5a8aa8">than human identities in the avg. enterprise</text>
</svg>
