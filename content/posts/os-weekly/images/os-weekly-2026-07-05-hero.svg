<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050c1a"/>
      <stop offset="100%" stop-color="#0c1f3a"/>
    </linearGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#0e2440" stroke-width="0.8"/>
    </pattern>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c2040"/>
      <stop offset="100%" stop-color="#071428"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow -->
  <ellipse cx="300" cy="315" rx="400" ry="300" fill="#00c9e0" opacity="0.025"/>

  <!-- Top border -->
  <rect x="0" y="0" width="1200" height="4" fill="#00c9e0"/>

  <!-- Left vertical accent -->
  <rect x="82" y="108" width="4" height="392" rx="2" fill="#00c9e0"/>

  <!-- OS-WEEKLY label -->
  <rect x="106" y="108" width="130" height="24" rx="12" fill="#061e38" stroke="#00c9e0" stroke-width="1"/>
  <text x="171" y="124" text-anchor="middle" font-size="10" fill="#00c9e0" letter-spacing="2" font-weight="600">OS-WEEKLY</text>
  <text x="246" y="124" font-size="11" fill="#3d6b8c" letter-spacing="1">JULY 5, 2026</text>

  <!-- Title -->
  <text x="106" y="198" font-size="34" font-weight="800" fill="#e8f4ff" letter-spacing="-0.5">Extortion Without</text>
  <text x="106" y="244" font-size="34" font-weight="800" fill="#e8f4ff" letter-spacing="-0.5">Ransomware, a 2M-Device</text>
  <text x="106" y="290" font-size="34" font-weight="800" fill="#00c9e0" letter-spacing="-0.5">Botnet &amp; AI's Double Edge</text>

  <!-- Divider -->
  <rect x="106" y="314" width="430" height="2" rx="1" fill="#1a3a5a"/>

  <!-- Subtitle -->
  <text x="106" y="346" font-size="17" fill="#7aaece" letter-spacing="0.2">$1M paid. No ransomware deployed. Two million devices seized.</text>

  <!-- Tags -->
  <rect x="106" y="372" width="80" height="26" rx="13" fill="#051828" stroke="#f59e0b" stroke-width="1"/>
  <text x="146" y="389" text-anchor="middle" font-size="11" fill="#f59e0b" letter-spacing="0.3">Extortion</text>

  <rect x="194" y="372" width="70" height="26" rx="13" fill="#051828" stroke="#ef4444" stroke-width="1"/>
  <text x="229" y="389" text-anchor="middle" font-size="11" fill="#ef4444" letter-spacing="0.3">Botnet</text>

  <rect x="272" y="372" width="128" height="26" rx="13" fill="#051828" stroke="#10b981" stroke-width="1"/>
  <text x="336" y="389" text-anchor="middle" font-size="11" fill="#10b981" letter-spacing="0.3">AI and Security</text>

  <!-- Branding -->
  <text x="106" y="572" font-size="12" fill="#2a5678" letter-spacing="3">CYBERSECURITYOS.NET</text>
  <text x="106" y="591" font-size="11" fill="#1e3d56">CyberShield Weekly Digest</text>

  <!-- RIGHT: Headline dashboard -->
  <rect x="690" y="72" width="462" height="506" rx="14" fill="url(#cardBg)" stroke="#132d4d" stroke-width="1.5"/>

  <!-- Dashboard header -->
  <rect x="690" y="72" width="462" height="50" rx="14" fill="#071428"/>
  <rect x="690" y="108" width="462" height="14" fill="#071428"/>
  <circle cx="718" cy="97" r="6" fill="#ef4444" opacity="0.6"/>
  <circle cx="738" cy="97" r="6" fill="#f59e0b" opacity="0.6"/>
  <circle cx="758" cy="97" r="6" fill="#10b981" opacity="0.6"/>
  <text x="921" y="102" text-anchor="middle" font-size="10" fill="#3d6b8c" letter-spacing="1.5">THIS WEEK'S HEADLINES</text>

  <!-- Headline 1: Kairos extortion -->
  <rect x="710" y="138" width="422" height="82" rx="7" fill="#071528" stroke="#f59e0b" stroke-width="1"/>
  <rect x="710" y="138" width="4" height="82" fill="#f59e0b"/>
  <text x="726" y="158" font-size="9" fill="#f59e0b" letter-spacing="1.2" font-weight="700">DATA-THEFT EXTORTION · NO RANSOMWARE</text>
  <text x="726" y="178" font-size="14" fill="#e8f4ff" font-weight="600">Gov Entity Paid Kairos $1M</text>
  <text x="726" y="198" font-size="10.5" fill="#5a8aa8">Threat of exposure — zero files encrypted</text>
  <text x="726" y="212" font-size="10.5" fill="#5a8aa8">Fear alone drove a seven-figure settlement</text>

  <!-- Headline 2: NetNut / Popa -->
  <rect x="710" y="230" width="422" height="82" rx="7" fill="#071528" stroke="#3b82f6" stroke-width="1"/>
  <rect x="710" y="230" width="4" height="82" fill="#3b82f6"/>
  <text x="726" y="250" font-size="9" fill="#3b82f6" letter-spacing="1.2" font-weight="700">FBI TAKEDOWN · NASDAQ-LISTED OPERATOR</text>
  <text x="726" y="270" font-size="14" fill="#e8f4ff" font-weight="600">NetNut Seized · Popa Botnet Dismantled</text>
  <text x="726" y="290" font-size="10.5" fill="#5a8aa8">2M compromised devices. Public-private action.</text>
  <text x="726" y="304" font-size="10.5" fill="#5a8aa8">Gray-market proxy services under new scrutiny</text>

  <!-- Headline 3: AI asymmetry -->
  <rect x="710" y="322" width="422" height="78" rx="7" fill="#071528" stroke="#10b981" stroke-width="1"/>
  <rect x="710" y="322" width="4" height="78" fill="#10b981"/>
  <text x="726" y="342" font-size="9" fill="#10b981" letter-spacing="1.2" font-weight="700">AI AND SECURITY · BOTH SIDES</text>
  <text x="726" y="362" font-size="14" fill="#e8f4ff" font-weight="600">AI's Asymmetric Advantage</text>
  <text x="726" y="382" font-size="10.5" fill="#5a8aa8">Whoever operationalizes AI first gains a compounding edge</text>

  <!-- Headline 4: Talos / Catan -->
  <rect x="710" y="410" width="422" height="78" rx="7" fill="#071528" stroke="#00c9e0" stroke-width="1"/>
  <rect x="710" y="410" width="4" height="78" fill="#00c9e0"/>
  <text x="726" y="430" font-size="9" fill="#00c9e0" letter-spacing="1.2" font-weight="700">DEFENDER MINDSET · TALOS</text>
  <text x="726" y="450" font-size="14" fill="#e8f4ff" font-weight="600">Catan and Mouse</text>
  <text x="726" y="470" font-size="10.5" fill="#5a8aa8">Curiosity is the defender's most valuable skill</text>

  <!-- Footer -->
  <rect x="710" y="498" width="422" height="62" rx="7" fill="#04101e"/>
  <text x="722" y="518" font-size="8.5" fill="#3d6b8c" letter-spacing="1.5">ALSO IN THIS ISSUE</text>
  <text x="722" y="536" font-size="10.5" fill="#4a7fa0">Blockchain analysis as an IR tool · Residential proxy red flags</text>
  <text x="722" y="552" font-size="10.5" fill="#4a7fa0">AI failure modes defenders need to know</text>
</svg>
