  <text x="490" y="79" font-size="8" fill="#f59e0b" letter-spacing="1" font-weight="700">STEP 1 · OSINT</text>
  <text x="490" y="97" font-size="12.5" fill="#f0f6ff" font-weight="600">LinkedIn → Persona</text>
  <text x="490" y="117" font-size="9.5" fill="#5a7a8a">10-min call, full access</text>

  <rect x="476" y="142" width="256" height="72" rx="7" fill="#1a0505" stroke="#ef4444" stroke-width="1"/>
  <rect x="476" y="142" width="4" height="72" fill="#ef4444"/>
  <text x="490" y="161" font-size="8" fill="#ef4444" letter-spacing="1" font-weight="700">STEP 2 · HELP DESK</text>
  <text x="490" y="179" font-size="12.5" fill="#f0f6ff" font-weight="600">Reset Password + MFA</text>
