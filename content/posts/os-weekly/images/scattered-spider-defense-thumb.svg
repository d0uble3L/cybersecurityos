  <rect x="476" y="224" width="256" height="72" rx="7" fill="#0d0a1a" stroke="#8b5cf6" stroke-width="1"/>
  <rect x="476" y="224" width="4" height="72" fill="#8b5cf6"/>
  <text x="490" y="243" font-size="8" fill="#8b5cf6" letter-spacing="1" font-weight="700">STEP 3 · MFA BYPASS</text>
