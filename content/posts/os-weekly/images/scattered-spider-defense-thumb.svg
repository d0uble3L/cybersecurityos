  <text x="490" y="281" font-size="9.5" fill="#5a7a8a">TfL: Telegram "Star Chat"</text>

  <rect x="476" y="306" width="256" height="72" rx="7" fill="#031410" stroke="#10b981" stroke-width="1"/>
  <rect x="476" y="306" width="4" height="72" fill="#10b981"/>
  <text x="490" y="325" font-size="8" fill="#10b981" letter-spacing="1" font-weight="700">THE DEFENSE</text>
  <text x="490" y="343" font-size="12.5" fill="#f0f6ff" font-weight="600">FIDO2 + Process Hygiene</text>
