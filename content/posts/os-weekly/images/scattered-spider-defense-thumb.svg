  <rect x="216" y="272" width="84" height="22" rx="11" fill="#051828" stroke="#10b981" stroke-width="1"/>
  <text x="258" y="287" text-anchor="middle" font-size="10" fill="#10b981">FIDO2 MFA</text>

  <!-- Branding -->
