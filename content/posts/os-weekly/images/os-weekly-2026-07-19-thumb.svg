<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050c1a"/>
      <stop offset="100%" stop-color="#0c1f3a"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0e2440" stroke-width="0.7"/>
    </pattern>
  </defs>

  <rect width="800" height="420" fill="url(#bg)"/>
  <rect width="800" height="420" fill="url(#grid)"/>

  <!-- Top accent -->
  <rect x="0" y="0" width="800" height="4" fill="#00c9e0"/>

  <!-- Left bar -->
  <rect x="52" y="56" width="4" height="254" rx="2" fill="#00c9e0"/>

  <!-- OS-WEEKLY chip -->
  <rect x="72" y="56" width="106" height="22" rx="11" fill="#061e38" stroke="#00c9e0" stroke-width="1"/>
  <text x="125" y="71" text-anchor="middle" font-size="9.5" fill="#00c9e0" letter-spacing="2" font-weight="600">OS-WEEKLY</text>
  <text x="188" y="71" font-size="9.5" fill="#3d6b8c" letter-spacing="1">JUL 19, 2026</text>

  <!-- Title -->
  <text x="72" y="128" font-size="26" font-weight="800" fill="#e8f4ff" letter-spacing="-0.5">Zero-Day Ransomware,</text>
  <text x="72" y="166" font-size="26" font-weight="800" fill="#e8f4ff" letter-spacing="-0.5">Record Patch Tuesday</text>
  <text x="72" y="204" font-size="26" font-weight="800" fill="#00c9e0" letter-spacing="-0.5">&amp; a Trust Problem</text>

  <!-- Divider -->
  <rect x="72" y="222" width="280" height="2" rx="1" fill="#1a3a5a"/>

  <!-- Subtitle -->
  <text x="72" y="250" font-size="14" fill="#7aaece">Two "moderate" bugs chained into root access.</text>

  <!-- Tags -->
  <rect x="72" y="272" width="90" height="22" rx="11" fill="#051828" stroke="#ef4444" stroke-width="1"/>
  <text x="117" y="287" text-anchor="middle" font-size="10" fill="#ef4444">Ransomware</text>

  <rect x="170" y="272" width="56" height="22" rx="11" fill="#051828" stroke="#f59e0b" stroke-width="1"/>
  <text x="198" y="287" text-anchor="middle" font-size="10" fill="#f59e0b">CISA</text>

  <rect x="234" y="272" width="128" height="22" rx="11" fill="#051828" stroke="#a855f7" stroke-width="1"/>
  <text x="298" y="287" text-anchor="middle" font-size="10" fill="#a855f7">Patch Tuesday</text>

  <!-- Branding -->
  <text x="72" y="388" font-size="11" fill="#1e3d56" letter-spacing="2.5">CYBERSECURITYOS.NET</text>

  <!-- Right: story cards -->
  <rect x="476" y="58" width="256" height="70" rx="7" fill="#071528" stroke="#ef4444" stroke-width="1"/>
  <rect x="476" y="58" width="4" height="70" fill="#ef4444"/>
  <text x="490" y="77" font-size="8" fill="#ef4444" letter-spacing="1" font-weight="700">RANSOMWARE · ZERO-DAY</text>
  <text x="490" y="95" font-size="12.5" fill="#f0f6ff" font-weight="600">SonicWall SMA Chain</text>
  <text x="490" y="115" font-size="9.5" fill="#5a8aa8">Two flaws, one root shell</text>

  <rect x="476" y="138" width="256" height="70" rx="7" fill="#071528" stroke="#f59e0b" stroke-width="1"/>
  <rect x="476" y="138" width="4" height="70" fill="#f59e0b"/>
  <text x="490" y="157" font-size="8" fill="#f59e0b" letter-spacing="1" font-weight="700">CISA · ACTIVE EXPLOIT</text>
  <text x="490" y="175" font-size="12.5" fill="#f0f6ff" font-weight="600">SharePoint On-Prem</text>
  <text x="490" y="195" font-size="9.5" fill="#5a8aa8">Exploitation confirmed now</text>

  <rect x="476" y="218" width="256" height="70" rx="7" fill="#071528" stroke="#00c9e0" stroke-width="1"/>
  <rect x="476" y="218" width="4" height="70" fill="#00c9e0"/>
  <text x="490" y="237" font-size="8" fill="#00c9e0" letter-spacing="1" font-weight="700">PATCH TUESDAY · RECORD</text>
  <text x="490" y="255" font-size="12.5" fill="#f0f6ff" font-weight="600">570–622 CVEs Fixed</text>
  <text x="490" y="275" font-size="9.5" fill="#5a8aa8">Biggest release on record</text>

  <rect x="476" y="298" width="256" height="70" rx="7" fill="#071528" stroke="#a855f7" stroke-width="1"/>
  <rect x="476" y="298" width="4" height="70" fill="#a855f7"/>
  <text x="490" y="317" font-size="8" fill="#a855f7" letter-spacing="1" font-weight="700">SUPPLY CHAIN · CORE</text>
  <text x="490" y="335" font-size="12.5" fill="#f0f6ff" font-weight="600">wp2shell &amp; npm</text>
  <text x="490" y="355" font-size="9.5" fill="#5a8aa8">Unauth RCE, public PoC</text>
