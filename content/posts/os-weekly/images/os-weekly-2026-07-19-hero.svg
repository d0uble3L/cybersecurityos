<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050c1a"/>
      <stop offset="100%" stop-color="#0c1f3a"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0e2440" stroke-width="0.7"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect width="1200" height="420" fill="url(#grid)"/>

  <!-- Top accent -->
  <rect x="0" y="0" width="1200" height="4" fill="#00c9e0"/>

  <!-- Left bar -->
  <rect x="64" y="56" width="4" height="280" rx="2" fill="#00c9e0"/>

  <!-- OS-WEEKLY chip -->
  <rect x="84" y="56" width="106" height="22" rx="11" fill="#061e38" stroke="#00c9e0" stroke-width="1"/>
  <text x="137" y="71" text-anchor="middle" font-size="9.5" fill="#00c9e0" letter-spacing="2" font-weight="600">OS-WEEKLY</text>
  <text x="200" y="71" font-size="9.5" fill="#3d6b8c" letter-spacing="1">JUL 19, 2026</text>

  <!-- Title -->
  <text x="84" y="136" font-size="32" font-weight="800" fill="#e8f4ff" letter-spacing="-0.5">Zero-Day Ransomware, Record</text>
  <text x="84" y="182" font-size="32" font-weight="800" fill="#00c9e0" letter-spacing="-0.5">Patch Tuesday &amp; a Trust Problem</text>

  <!-- Divider -->
  <rect x="84" y="204" width="380" height="2" rx="1" fill="#1a3a5a"/>

  <!-- Subtitle -->
  <text x="84" y="234" font-size="15" fill="#7aaece">Two "moderate" SonicWall bugs chained into root access — plus a record-breaking Patch Tuesday.</text>

  <!-- Tags -->
  <rect x="84" y="260" width="90" height="24" rx="12" fill="#051828" stroke="#ef4444" stroke-width="1"/>
  <text x="129" y="276" text-anchor="middle" font-size="10.5" fill="#ef4444">Ransomware</text>

  <rect x="182" y="260" width="56" height="24" rx="12" fill="#051828" stroke="#f59e0b" stroke-width="1"/>
  <text x="210" y="276" text-anchor="middle" font-size="10.5" fill="#f59e0b">CISA</text>

  <rect x="246" y="260" width="96" height="24" rx="12" fill="#051828" stroke="#a855f7" stroke-width="1"/>
  <text x="294" y="276" text-anchor="middle" font-size="10.5" fill="#a855f7">WordPress</text>

  <rect x="350" y="260" width="100" height="24" rx="12" fill="#051828" stroke="#10b981" stroke-width="1"/>
  <text x="400" y="276" text-anchor="middle" font-size="10.5" fill="#10b981">Supply Chain</text>

  <!-- Branding -->
  <text x="84" y="388" font-size="11" fill="#1e3d56" letter-spacing="2.5">CYBERSECURITYOS.NET</text>

  <!-- Right: story cards (two columns) -->
  <!-- Col 1 -->
  <rect x="680" y="58" width="230" height="78" rx="7" fill="#071528" stroke="#ef4444" stroke-width="1"/>
  <rect x="680" y="58" width="4" height="78" fill="#ef4444"/>
  <text x="694" y="79" font-size="8" fill="#ef4444" letter-spacing="1" font-weight="700">RANSOMWARE · ZERO-DAY</text>
  <text x="694" y="97" font-size="12.5" fill="#f0f6ff" font-weight="600">SonicWall SMA Chain</text>
  <text x="694" y="117" font-size="9.5" fill="#5a8aa8">Two flaws chained to root</text>

  <rect x="680" y="148" width="230" height="78" rx="7" fill="#071528" stroke="#f59e0b" stroke-width="1"/>
  <rect x="680" y="148" width="4" height="78" fill="#f59e0b"/>
  <text x="694" y="169" font-size="8" fill="#f59e0b" letter-spacing="1" font-weight="700">CISA · ACTIVE EXPLOIT</text>
  <text x="694" y="187" font-size="12.5" fill="#f0f6ff" font-weight="600">SharePoint On-Prem</text>
  <text x="694" y="207" font-size="9.5" fill="#5a8aa8">Exploitation confirmed now</text>

  <rect x="680" y="238" width="230" height="78" rx="7" fill="#071528" stroke="#a855f7" stroke-width="1"/>
  <rect x="680" y="238" width="4" height="78" fill="#a855f7"/>
  <text x="694" y="259" font-size="8" fill="#a855f7" letter-spacing="1" font-weight="700">SUPPLY CHAIN · CORE</text>
  <text x="694" y="277" font-size="12.5" fill="#f0f6ff" font-weight="600">wp2shell WordPress Flaw</text>
  <text x="694" y="297" font-size="9.5" fill="#5a8aa8">Unauth RCE, public PoC live</text>

  <rect x="680" y="328" width="230" height="70" rx="7" fill="#071528" stroke="#10b981" stroke-width="1"/>
  <rect x="680" y="328" width="4" height="70" fill="#10b981"/>
  <text x="694" y="347" font-size="8" fill="#10b981" letter-spacing="1" font-weight="700">SUPPLY CHAIN · NPM</text>
  <text x="694" y="365" font-size="12.5" fill="#f0f6ff" font-weight="600">jscrambler 8.14.0</text>
  <text x="694" y="385" font-size="9.5" fill="#5a8aa8">Rust infostealer, 6 min to catch</text>

  <!-- Col 2 -->
  <rect x="924" y="58" width="230" height="78" rx="7" fill="#071528" stroke="#00c9e0" stroke-width="1"/>
  <rect x="924" y="58" width="4" height="78" fill="#00c9e0"/>
  <text x="938" y="79" font-size="8" fill="#00c9e0" letter-spacing="1" font-weight="700">PATCH TUESDAY · RECORD</text>
  <text x="938" y="97" font-size="12.5" fill="#f0f6ff" font-weight="600">570–622 CVEs Fixed</text>
  <text x="938" y="117" font-size="9.5" fill="#5a8aa8">Biggest release on record</text>

  <rect x="924" y="148" width="230" height="78" rx="7" fill="#071528" stroke="#3b82f6" stroke-width="1"/>
  <rect x="924" y="148" width="4" height="78" fill="#3b82f6"/>
  <text x="938" y="169" font-size="8" fill="#3b82f6" letter-spacing="1" font-weight="700">DEV TOOLING</text>
  <text x="938" y="187" font-size="12.5" fill="#f0f6ff" font-weight="600">Cursor git.exe Flaw</text>
  <text x="938" y="207" font-size="9.5" fill="#5a8aa8">Silent execution on clone</text>

  <rect x="924" y="238" width="230" height="78" rx="7" fill="#071528" stroke="#64748b" stroke-width="1"/>
  <rect x="924" y="238" width="4" height="78" fill="#64748b"/>
  <text x="938" y="259" font-size="8" fill="#64748b" letter-spacing="1" font-weight="700">VENDOR TRUST</text>
  <text x="938" y="277" font-size="12.5" fill="#f0f6ff" font-weight="600">Who's Behind That Startup?</text>
  <text x="938" y="297" font-size="9.5" fill="#5a8aa8">Felons selling zero-days</text>

  <rect x="924" y="328" width="230" height="70" rx="7" fill="#071528" stroke="#f59e0b" stroke-width="1"/>
  <rect x="924" y="328" width="4" height="70" fill="#f59e0b"/>
  <text x="938" y="347" font-size="8" fill="#f59e0b" letter-spacing="1" font-weight="700">FUNDING</text>
  <text x="938" y="365" font-size="12.5" fill="#f0f6ff" font-weight="600">Oak's $60M Seed Round</text>
  <text x="938" y="385" font-size="9.5" fill="#5a8aa8">AI-agent identity governance</text>
</svg>
