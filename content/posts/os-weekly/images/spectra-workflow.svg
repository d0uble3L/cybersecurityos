<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" font-family="'Courier New', Courier, monospace">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1b2a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="spectraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2744;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2b1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#081a0f;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b9eff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00e676"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bgGrad)" rx="12"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="#3b9eff" stroke-width="1">
    <line x1="0" y1="52" x2="900" y2="52"/>
    <line x1="0" y1="104" x2="900" y2="104"/>
    <line x1="0" y1="156" x2="900" y2="156"/>
    <line x1="0" y1="208" x2="900" y2="208"/>
    <line x1="0" y1="260" x2="900" y2="260"/>
    <line x1="0" y1="312" x2="900" y2="312"/>
    <line x1="0" y1="364" x2="900" y2="364"/>
    <line x1="0" y1="416" x2="900" y2="416"/>
    <line x1="0" y1="468" x2="900" y2="468"/>
    <line x1="90" y1="0" x2="90" y2="520"/>
    <line x1="180" y1="0" x2="180" y2="520"/>
    <line x1="270" y1="0" x2="270" y2="520"/>
    <line x1="360" y1="0" x2="360" y2="520"/>
    <line x1="450" y1="0" x2="450" y2="520"/>
    <line x1="540" y1="0" x2="540" y2="520"/>
    <line x1="630" y1="0" x2="630" y2="520"/>
    <line x1="720" y1="0" x2="720" y2="520"/>
    <line x1="810" y1="0" x2="810" y2="520"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="900" height="4" fill="#3b9eff" rx="2"/>

  <!-- Title -->
  <text x="450" y="45" fill="#e8f4fd" font-size="18" font-weight="bold" text-anchor="middle" letter-spacing="3" filter="url(#glow)">SPECTRA — INTELLIGENCE PIPELINE</text>
  <text x="450" y="64" fill="#5a8faa" font-size="11" text-anchor="middle" letter-spacing="2">Security Platform for Expert-level Correlation, Triage, and Risk Analysis</text>

  <!-- ─────────── COLUMN 1: SCANNERS ─────────── -->
  <text x="130" y="100" fill="#3b9eff" font-size="11" text-anchor="middle" letter-spacing="2" font-weight="bold">INPUT SCANNERS</text>

  <!-- Trivy box -->
  <rect x="30" y="112" width="200" height="62" rx="6" fill="#0d1b2a" stroke="#3b9eff" stroke-width="1.2" opacity="0.9"/>
  <rect x="30" y="112" width="4" height="62" rx="2" fill="#3b9eff"/>
  <text x="60" y="135" fill="#3b9eff" font-size="13" font-weight="bold">TRIVY</text>
  <text x="60" y="152" fill="#7ab3cc" font-size="10">Container &amp; IaC scanner</text>
  <text x="60" y="167" fill="#4a7a8a" font-size="10">CVEs · Secrets · SBOM · Misconfigs</text>

  <!-- Semgrep box -->
  <rect x="30" y="192" width="200" height="62" rx="6" fill="#0d1b2a" stroke="#3b9eff" stroke-width="1.2" opacity="0.9"/>
  <rect x="30" y="192" width="4" height="62" rx="2" fill="#3b9eff"/>
  <text x="60" y="215" fill="#3b9eff" font-size="13" font-weight="bold">SEMGREP</text>
  <text x="60" y="232" fill="#7ab3cc" font-size="10">SAST · Source code analysis</text>
  <text x="60" y="247" fill="#4a7a8a" font-size="10">XSS · SQLi · IDOR · Business logic</text>

  <!-- Nessus box -->
  <rect x="30" y="272" width="200" height="62" rx="6" fill="#0d1b2a" stroke="#3b9eff" stroke-width="1.2" opacity="0.9"/>
  <rect x="30" y="272" width="4" height="62" rx="2" fill="#3b9eff"/>
  <text x="60" y="295" fill="#3b9eff" font-size="13" font-weight="bold">GENERIC</text>
  <text x="60" y="312" fill="#7ab3cc" font-size="10">Nessus · Burp Suite · OpenVAS</text>
  <text x="60" y="327" fill="#4a7a8a" font-size="10">Pentest notes · Text reports</text>

  <!-- stdin label -->
  <rect x="30" y="352" width="200" height="38" rx="6" fill="#0a0e1a" stroke="#1e3a4a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="130" y="366" fill="#3a6070" font-size="10" text-anchor="middle">$ cat report.txt |</text>
  <text x="130" y="382" fill="#3a6070" font-size="10" text-anchor="middle">spectra analyze --scanner generic</text>

  <!-- Arrows scanner → spectra -->
  <line x1="232" y1="143" x2="312" y2="220" stroke="#3b9eff" stroke-width="1.5" marker-end="url(#arrowBlue)" opacity="0.7"/>
  <line x1="232" y1="223" x2="312" y2="240" stroke="#3b9eff" stroke-width="1.5" marker-end="url(#arrowBlue)" opacity="0.7"/>
  <line x1="232" y1="303" x2="312" y2="265" stroke="#3b9eff" stroke-width="1.5" marker-end="url(#arrowBlue)" opacity="0.7"/>

  <!-- ─────────── COLUMN 2: SPECTRA ENGINE ─────────── -->
  <text x="450" y="100" fill="#3b9eff" font-size="11" text-anchor="middle" letter-spacing="2" font-weight="bold">SPECTRA + CLAUDE AI</text>

  <rect x="318" y="112" width="264" height="308" rx="10" fill="url(#spectraGrad)" stroke="#3b9eff" stroke-width="1.8" filter="url(#glow)"/>

  <!-- Spectra logo text -->
  <text x="450" y="148" fill="#ffffff" font-size="22" font-weight="bold" text-anchor="middle" letter-spacing="4" filter="url(#glow)">SPECTRA</text>
  <text x="450" y="166" fill="#5a9fcc" font-size="9" text-anchor="middle" letter-spacing="1">Powered by Claude (Anthropic)</text>

  <line x1="338" y1="178" x2="562" y2="178" stroke="#3b9eff" stroke-width="0.5" opacity="0.4"/>

  <!-- Engine steps -->
  <g fill="#c8dff0" font-size="11">
    <circle cx="344" cy="203" r="3" fill="#3b9eff"/>
    <text x="356" y="207">Format auto-detection</text>

    <circle cx="344" cy="228" r="3" fill="#3b9eff"/>
    <text x="356" y="232">Finding normalization</text>

    <circle cx="344" cy="253" r="3" fill="#3b9eff"/>
    <text x="356" y="257">De-duplication</text>

    <circle cx="344" cy="278" r="3" fill="#3b9eff"/>
    <text x="356" y="282">Severity calibration (EPSS+KEV)</text>

    <circle cx="344" cy="303" r="3" fill="#3b9eff"/>
    <text x="356" y="307">Attack chain identification</text>

    <circle cx="344" cy="328" r="3" fill="#3b9eff"/>
    <text x="356" y="332">Remediation synthesis</text>

    <circle cx="344" cy="353" r="3" fill="#3b9eff"/>
    <text x="356" y="357">Executive summary generation</text>
  </g>

  <!-- Prompt cache badge -->
  <rect x="338" y="376" width="224" height="28" rx="4" fill="#0a2040" stroke="#1a4060" stroke-width="1"/>
  <text x="450" y="395" fill="#3b9eff" font-size="10" text-anchor="middle">⚡ Prompt caching — ~90% cost reduction</text>

  <!-- ─────────── COLUMN 3: OUTPUTS ─────────── -->
  <text x="760" y="100" fill="#00e676" font-size="11" text-anchor="middle" letter-spacing="2" font-weight="bold">OUTPUTS</text>

  <!-- Arrow SPECTRA → outputs -->
  <line x1="584" y1="220" x2="648" y2="158" stroke="#00e676" stroke-width="1.5" marker-end="url(#arrowGreen)" opacity="0.7"/>
  <line x1="584" y1="256" x2="648" y2="238" stroke="#00e676" stroke-width="1.5" marker-end="url(#arrowGreen)" opacity="0.7"/>
  <line x1="584" y1="300" x2="648" y2="318" stroke="#00e676" stroke-width="1.5" marker-end="url(#arrowGreen)" opacity="0.7"/>
  <line x1="584" y1="340" x2="648" y2="398" stroke="#00e676" stroke-width="1.5" marker-end="url(#arrowGreen)" opacity="0.7"/>

  <!-- Output 1: Ranked Findings -->
  <rect x="654" y="112" width="216" height="58" rx="6" fill="url(#outputGrad)" stroke="#00e676" stroke-width="1.2"/>
  <rect x="654" y="112" width="4" height="58" rx="2" fill="#00e676"/>
  <text x="682" y="132" fill="#00e676" font-size="11" font-weight="bold">RANKED FINDINGS</text>
  <text x="682" y="149" fill="#7ac89a" font-size="10">Severity-calibrated priority queue</text>
  <text x="682" y="163" fill="#4a8a5a" font-size="10">Real-world risk · Not just CVSS</text>

  <!-- Output 2: Attack Chains -->
  <rect x="654" y="192" width="216" height="58" rx="6" fill="url(#outputGrad)" stroke="#00e676" stroke-width="1.2"/>
  <rect x="654" y="192" width="4" height="58" rx="2" fill="#00c853"/>
  <text x="682" y="212" fill="#00e676" font-size="11" font-weight="bold">ATTACK CHAIN ANALYSIS</text>
  <text x="682" y="229" fill="#7ac89a" font-size="10">Chained vulnerability paths</text>
  <text x="682" y="243" fill="#4a8a5a" font-size="10">Exploitability context per finding</text>

  <!-- Output 3: Remediation -->
  <rect x="654" y="272" width="216" height="58" rx="6" fill="url(#outputGrad)" stroke="#00e676" stroke-width="1.2"/>
  <rect x="654" y="272" width="4" height="58" rx="2" fill="#00e676"/>
  <text x="682" y="292" fill="#00e676" font-size="11" font-weight="bold">REMEDIATION STEPS</text>
  <text x="682" y="309" fill="#7ac89a" font-size="10">Concrete fix guidance per finding</text>
  <text x="682" y="323" fill="#4a8a5a" font-size="10">Markdown · JSON · Both</text>

  <!-- Output 4: Exec Summary -->
  <rect x="654" y="352" width="216" height="58" rx="6" fill="url(#outputGrad)" stroke="#00e676" stroke-width="1.2"/>
  <rect x="654" y="352" width="4" height="58" rx="2" fill="#00c853"/>
  <text x="682" y="372" fill="#00e676" font-size="11" font-weight="bold">EXECUTIVE SUMMARY</text>
  <text x="682" y="389" fill="#7ac89a" font-size="10">Leadership-ready plain language</text>
  <text x="682" y="403" fill="#4a8a5a" font-size="10">Board · GRC · CISO briefings</text>

  <!-- Bottom footer -->
  <text x="450" y="470" fill="#2a4a5a" font-size="10" text-anchor="middle">github.com/d0uble3L/spectra · cybersecurityos.net</text>

  <!-- Bottom accent -->
  <rect x="0" y="516" width="900" height="4" fill="#3b9eff" rx="2"/>
</svg>
