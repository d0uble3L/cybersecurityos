<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050c1a"/>
      <stop offset="100%" stop-color="#0c1f3a"/>
    </linearGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#0e2440" stroke-width="0.8"/>
    </pattern>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c2040"/>
      <stop offset="100%" stop-color="#071428"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow -->
  <ellipse cx="300" cy="315" rx="400" ry="300" fill="#00c9e0" opacity="0.025"/>

  <!-- Top border -->
  <rect x="0" y="0" width="1200" height="4" fill="#00c9e0"/>

  <!-- Left vertical accent -->
  <rect x="82" y="118" width="4" height="372" rx="2" fill="#00c9e0"/>

  <!-- OS-WEEKLY label -->
  <rect x="106" y="118" width="130" height="24" rx="12" fill="#061e38" stroke="#00c9e0" stroke-width="1"/>
  <text x="171" y="134" text-anchor="middle" font-size="10" fill="#00c9e0" letter-spacing="2" font-weight="600">OS-WEEKLY</text>
  <text x="246" y="134" font-size="11" fill="#3d6b8c" letter-spacing="1">JUNE 25, 2026</text>

  <!-- Title -->
  <text x="106" y="208" font-size="46" font-weight="800" fill="#e8f4ff" letter-spacing="-1.5">AWS Security</text>
  <text x="106" y="262" font-size="46" font-weight="800" fill="#00c9e0" letter-spacing="-1.5">Agent</text>

  <!-- Divider -->
  <rect x="106" y="286" width="420" height="2" rx="1" fill="#1a3a5a"/>

  <!-- Subtitle -->
  <text x="106" y="318" font-size="19" fill="#7aaece" letter-spacing="0.3">Continuous AppSec, Design to Deployment</text>

  <!-- Tags -->
  <rect x="106" y="344" width="150" height="26" rx="13" fill="#051828" stroke="#00c9e0" stroke-width="1"/>
  <text x="181" y="361" text-anchor="middle" font-size="11" fill="#00c9e0" letter-spacing="0.5">Penetration Testing</text>

  <rect x="266" y="344" width="134" height="26" rx="13" fill="#051828" stroke="#3b82f6" stroke-width="1"/>
  <text x="333" y="361" text-anchor="middle" font-size="11" fill="#3b82f6" letter-spacing="0.5">Threat Modeling</text>

  <rect x="410" y="344" width="118" height="26" rx="13" fill="#051828" stroke="#f59e0b" stroke-width="1"/>
  <text x="469" y="361" text-anchor="middle" font-size="11" fill="#f59e0b" letter-spacing="0.5">Code Review</text>

  <!-- Branding -->
  <text x="106" y="572" font-size="12" fill="#2a5678" letter-spacing="3">CYBERSECURITYOS.NET</text>
  <text x="106" y="591" font-size="11" fill="#1e3d56">AWS Continuum · Frontier Agent</text>

  <!-- RIGHT: Mini Dashboard -->
  <rect x="690" y="72" width="462" height="506" rx="14" fill="url(#cardBg)" stroke="#132d4d" stroke-width="1.5"/>

  <!-- Dashboard header -->
  <rect x="690" y="72" width="462" height="50" rx="14" fill="#071428"/>
  <rect x="690" y="108" width="462" height="14" fill="#071428"/>
  <circle cx="718" cy="97" r="6" fill="#ef4444" opacity="0.6"/>
  <circle cx="738" cy="97" r="6" fill="#f59e0b" opacity="0.6"/>
  <circle cx="758" cy="97" r="6" fill="#10b981" opacity="0.6"/>
  <text x="921" y="102" text-anchor="middle" font-size="10" fill="#3d6b8c" letter-spacing="1.5">AGENT CAPABILITIES</text>

  <!-- Card 1: On-demand pentest -->
  <rect x="710" y="138" width="422" height="86" rx="7" fill="#071528" stroke="#00c9e0" stroke-width="1"/>
  <rect x="710" y="138" width="4" height="86" fill="#00c9e0"/>
  <text x="726" y="159" font-size="9" fill="#00c9e0" letter-spacing="1.2" font-weight="700">ON-DEMAND PENTESTING</text>
  <text x="726" y="180" font-size="14" fill="#e8f4ff" font-weight="600">Weeks to hours, 24/7</text>
  <text x="726" y="200" font-size="10.5" fill="#5a8aa8">Multi-step attack chains across OWASP Top 10</text>
  <text x="726" y="216" font-size="10.5" fill="#5a8aa8">and business-logic flaws</text>

  <!-- Card 2: Validated findings -->
  <rect x="710" y="234" width="422" height="86" rx="7" fill="#071528" stroke="#10b981" stroke-width="1"/>
  <rect x="710" y="234" width="4" height="86" fill="#10b981"/>
  <text x="726" y="255" font-size="9" fill="#10b981" letter-spacing="1.2" font-weight="700">PROOF-BASED VALIDATION</text>
  <text x="726" y="276" font-size="14" fill="#e8f4ff" font-weight="600">Reproducible exploit paths</text>
  <text x="726" y="296" font-size="10.5" fill="#5a8aa8">Ready-to-implement fixes via auto-generated</text>
  <text x="726" y="312" font-size="10.5" fill="#5a8aa8">pull requests, with retesting to confirm</text>

  <!-- Card 3: Continuous PR scanning -->
  <rect x="710" y="330" width="422" height="78" rx="7" fill="#071528" stroke="#3b82f6" stroke-width="1"/>
  <rect x="710" y="330" width="4" height="78" fill="#3b82f6"/>
  <text x="726" y="351" font-size="9" fill="#3b82f6" letter-spacing="1.2" font-weight="700">CONTINUOUS VALIDATION</text>
  <text x="726" y="371" font-size="14" fill="#e8f4ff" font-weight="600">Every PR, every repo</text>
  <text x="726" y="391" font-size="10.5" fill="#5a8aa8">Findings posted as inline review comments</text>

  <!-- Card 4: Threat modeling -->
  <rect x="710" y="416" width="422" height="78" rx="7" fill="#071528" stroke="#f59e0b" stroke-width="1"/>
  <rect x="710" y="416" width="4" height="78" fill="#f59e0b"/>
  <text x="726" y="437" font-size="9" fill="#f59e0b" letter-spacing="1.2" font-weight="700">STRIDE THREAT MODELS</text>
  <text x="726" y="457" font-size="14" fill="#e8f4ff" font-weight="600">Design-phase risk mapping</text>
  <text x="726" y="477" font-size="10.5" fill="#5a8aa8">Trust boundaries and data flows, before code</text>

  <!-- Footer bar -->
  <rect x="710" y="504" width="422" height="56" rx="7" fill="#04101e"/>
  <text x="722" y="524" font-size="8.5" fill="#3d6b8c" letter-spacing="1.5">IDE &amp; PIPELINE INTEGRATION</text>
  <text x="722" y="542" font-size="10.5" fill="#4a7fa0">Kiro · Claude Code plugin · Open MCP · CLI · API</text>
</svg>
