<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" font-family="'Courier New', Courier, monospace">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080e12"/>
      <stop offset="100%" style="stop-color:#0a1a10"/>
    </linearGradient>
    <linearGradient id="stageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2010"/>
      <stop offset="100%" style="stop-color:#081408"/>
    </linearGradient>
    <linearGradient id="spectraStage" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1e30"/>
      <stop offset="100%" style="stop-color:#051018"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00e5ff"/>
    </marker>
    <marker id="arrowGreen3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00e676"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff1744"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg3)" rx="12"/>

  <!-- Subtle grid -->
  <g opacity="0.035" stroke="#00e5ff" stroke-width="1">
    <line x1="0" y1="52" x2="900" y2="52"/><line x1="0" y1="104" x2="900" y2="104"/>
    <line x1="0" y1="156" x2="900" y2="156"/><line x1="0" y1="208" x2="900" y2="208"/>
    <line x1="0" y1="260" x2="900" y2="260"/><line x1="0" y1="312" x2="900" y2="312"/>
    <line x1="0" y1="364" x2="900" y2="364"/><line x1="0" y1="416" x2="900" y2="416"/>
    <line x1="0" y1="468" x2="900" y2="468"/>
    <line x1="90" y1="0" x2="90" y2="520"/><line x1="180" y1="0" x2="180" y2="520"/>
    <line x1="270" y1="0" x2="270" y2="520"/><line x1="360" y1="0" x2="360" y2="520"/>
    <line x1="450" y1="0" x2="450" y2="520"/><line x1="540" y1="0" x2="540" y2="520"/>
    <line x1="630" y1="0" x2="630" y2="520"/><line x1="720" y1="0" x2="720" y2="520"/>
    <line x1="810" y1="0" x2="810" y2="520"/>
  </g>

  <!-- Top accent -->
  <rect x="0" y="0" width="900" height="4" fill="#00e5ff" rx="2"/>

  <!-- Title -->
  <text x="450" y="45" fill="#d4f5ff" font-size="18" font-weight="bold" text-anchor="middle" letter-spacing="3" filter="url(#glow3)">SPECTRA IN THE DevSecOps PIPELINE</text>
  <text x="450" y="64" fill="#4a8a9a" font-size="11" text-anchor="middle" letter-spacing="2">Shift-left security with AI-powered analysis at every gate</text>

  <!-- Pipeline track line -->
  <line x1="50" y1="220" x2="850" y2="220" stroke="#1a3a2a" stroke-width="3" stroke-dasharray="8,4"/>

  <!-- ─── STAGE 1: CODE COMMIT ─── -->
  <rect x="30" y="150" width="120" height="140" rx="8" fill="url(#stageGrad)" stroke="#00e676" stroke-width="1.3"/>
  <text x="90" y="175" fill="#00e676" font-size="10" text-anchor="middle" letter-spacing="1" font-weight="bold">COMMIT</text>
  <text x="90" y="195" fill="#4a9a6a" font-size="28" text-anchor="middle">{ }</text>
  <text x="90" y="225" fill="#7ac89a" font-size="9" text-anchor="middle">git push</text>
  <text x="90" y="243" fill="#4a7a5a" font-size="9" text-anchor="middle">Developer</text>
  <text x="90" y="258" fill="#4a7a5a" font-size="9" text-anchor="middle">submits PR</text>

  <!-- Arrow 1→2 -->
  <line x1="152" y1="220" x2="183" y2="220" stroke="#00e5ff" stroke-width="2" marker-end="url(#arrowCyan)"/>

  <!-- ─── STAGE 2: CI TRIGGER ─── -->
  <rect x="188" y="150" width="120" height="140" rx="8" fill="url(#stageGrad)" stroke="#00e5ff" stroke-width="1.3"/>
  <text x="248" y="175" fill="#00e5ff" font-size="10" text-anchor="middle" letter-spacing="1" font-weight="bold">CI TRIGGER</text>
  <text x="248" y="207" fill="#4aaabb" font-size="11" text-anchor="middle">▶ Build</text>
  <text x="248" y="225" fill="#4aaabb" font-size="11" text-anchor="middle">▶ Unit Tests</text>
  <text x="248" y="243" fill="#4aaabb" font-size="11" text-anchor="middle">▶ SAST Scan</text>
  <text x="248" y="261" fill="#4aaabb" font-size="11" text-anchor="middle">▶ Container</text>
  <text x="248" y="279" fill="#4a8a9a" font-size="9" text-anchor="middle">GitHub Actions / GitLab CI</text>

  <!-- Arrow 2→3 -->
  <line x1="310" y1="220" x2="341" y2="220" stroke="#00e5ff" stroke-width="2" marker-end="url(#arrowCyan)"/>

  <!-- ─── STAGE 3: SCANNER OUTPUTS ─── -->
  <rect x="346" y="130" width="120" height="180" rx="8" fill="url(#stageGrad)" stroke="#00e5ff" stroke-width="1.3"/>
  <text x="406" y="155" fill="#00e5ff" font-size="10" text-anchor="middle" letter-spacing="1" font-weight="bold">SCANNERS</text>
  <rect x="360" y="165" width="92" height="20" rx="3" fill="#0a2020" stroke="#1a5050" stroke-width="1"/>
  <text x="406" y="179" fill="#6ad0e0" font-size="9" text-anchor="middle">TRIVY → trivy.json</text>
  <rect x="360" y="192" width="92" height="20" rx="3" fill="#0a2020" stroke="#1a5050" stroke-width="1"/>
  <text x="406" y="206" fill="#6ad0e0" font-size="9" text-anchor="middle">SEMGREP → sast.json</text>
  <rect x="360" y="219" width="92" height="20" rx="3" fill="#0a2020" stroke="#1a5050" stroke-width="1"/>
  <text x="406" y="233" fill="#6ad0e0" font-size="9" text-anchor="middle">NESSUS → host.txt</text>
  <text x="406" y="264" fill="#3a6a7a" font-size="9" text-anchor="middle">Raw · Unranked</text>
  <text x="406" y="279" fill="#3a6a7a" font-size="9" text-anchor="middle">No context</text>

  <!-- Arrow 3→4 (SPECTRA) -->
  <line x1="468" y1="220" x2="499" y2="220" stroke="#3b9eff" stroke-width="2.5" marker-end="url(#arrowCyan)"/>

  <!-- ─── STAGE 4: SPECTRA ─── (highlighted) -->
  <rect x="504" y="120" width="130" height="200" rx="10" fill="url(#spectraStage)" stroke="#3b9eff" stroke-width="2" filter="url(#glow3)"/>
  <rect x="504" y="120" width="130" height="5" rx="4" fill="#3b9eff"/>
  <text x="569" y="148" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle" letter-spacing="3" filter="url(#glow3)">SPECTRA</text>
  <text x="569" y="164" fill="#5a9fcc" font-size="8" text-anchor="middle">+ Claude AI</text>

  <line x1="520" y1="175" x2="618" y2="175" stroke="#3b9eff" stroke-width="0.5" opacity="0.4"/>

  <text x="519" y="192" fill="#a0c8e8" font-size="9">→ Auto-detect format</text>
  <text x="519" y="208" fill="#a0c8e8" font-size="9">→ De-duplicate</text>
  <text x="519" y="224" fill="#a0c8e8" font-size="9">→ Rank &amp; calibrate</text>
  <text x="519" y="240" fill="#a0c8e8" font-size="9">→ Chain analysis</text>
  <text x="519" y="256" fill="#a0c8e8" font-size="9">→ Remediation</text>
  <text x="519" y="272" fill="#a0c8e8" font-size="9">→ Exec summary</text>

  <rect x="514" y="284" width="110" height="20" rx="3" fill="#0a1a30" stroke="#1a3a50" stroke-width="1"/>
  <text x="569" y="298" fill="#3b9eff" font-size="8" text-anchor="middle">⚡ ~90% cost saved</text>

  <!-- Arrow 4→5 -->
  <line x1="636" y1="220" x2="667" y2="220" stroke="#00e676" stroke-width="2.5" marker-end="url(#arrowGreen3)"/>

  <!-- ─── STAGE 5: RESULTS ─── -->
  <rect x="672" y="130" width="120" height="180" rx="8" fill="url(#stageGrad)" stroke="#00e676" stroke-width="1.3"/>
  <text x="732" y="155" fill="#00e676" font-size="10" text-anchor="middle" letter-spacing="1" font-weight="bold">AI RESULTS</text>
  <rect x="686" y="165" width="92" height="18" rx="3" fill="#0a2010" stroke="#1a5020" stroke-width="1"/>
  <text x="732" y="178" fill="#7ac89a" font-size="9" text-anchor="middle">report.md</text>
  <rect x="686" y="190" width="92" height="18" rx="3" fill="#0a2010" stroke="#1a5020" stroke-width="1"/>
  <text x="732" y="203" fill="#7ac89a" font-size="9" text-anchor="middle">report.json</text>
  <rect x="686" y="215" width="92" height="18" rx="3" fill="#0a2010" stroke="#1a5020" stroke-width="1"/>
  <text x="732" y="228" fill="#7ac89a" font-size="9" text-anchor="middle">exec_summary.md</text>
  <text x="732" y="263" fill="#3a7a4a" font-size="9" text-anchor="middle">Ranked · Contextualized</text>
  <text x="732" y="278" fill="#3a7a4a" font-size="9" text-anchor="middle">Actionable</text>

  <!-- Arrow 5→6 -->
  <line x1="794" y1="220" x2="825" y2="220" stroke="#00e676" stroke-width="2" marker-end="url(#arrowGreen3)"/>

  <!-- ─── STAGE 6: DELIVERY ─── -->
  <rect x="830" y="150" width="40" height="140" rx="8" fill="url(#stageGrad)" stroke="#00e676" stroke-width="1.3"/>
  <text x="850" y="213" fill="#00e676" font-size="9" text-anchor="middle" writing-mode="tb" letter-spacing="1" font-weight="bold">DELIVER</text>

  <!-- Delivery outputs below pipeline -->
  <text x="450" y="360" fill="#4a8a6a" font-size="11" text-anchor="middle" letter-spacing="2" font-weight="bold">OUTPUT DELIVERY CHANNELS</text>

  <!-- Engineer box -->
  <rect x="60" y="376" width="180" height="80" rx="6" fill="#080e12" stroke="#00e5ff" stroke-width="1"/>
  <text x="150" y="400" fill="#00e5ff" font-size="11" font-weight="bold" text-anchor="middle">ENGINEERS</text>
  <text x="150" y="418" fill="#4a8a9a" font-size="10" text-anchor="middle">PR comment · JSON feed</text>
  <text x="150" y="434" fill="#4a8a9a" font-size="10" text-anchor="middle">IDE annotation</text>
  <text x="150" y="448" fill="#2a6a7a" font-size="9" text-anchor="middle">Fix now · Context included</text>

  <!-- Analyst box -->
  <rect x="260" y="376" width="180" height="80" rx="6" fill="#080e12" stroke="#00e5ff" stroke-width="1"/>
  <text x="350" y="400" fill="#00e5ff" font-size="11" font-weight="bold" text-anchor="middle">ANALYSTS</text>
  <text x="350" y="418" fill="#4a8a9a" font-size="10" text-anchor="middle">Markdown report</text>
  <text x="350" y="434" fill="#4a8a9a" font-size="10" text-anchor="middle">Attack chain breakdown</text>
  <text x="350" y="448" fill="#2a6a7a" font-size="9" text-anchor="middle">Triage in minutes not days</text>

  <!-- Ticketing box -->
  <rect x="460" y="376" width="180" height="80" rx="6" fill="#080e12" stroke="#00e676" stroke-width="1"/>
  <text x="550" y="400" fill="#00e676" font-size="11" font-weight="bold" text-anchor="middle">TICKETING</text>
  <text x="550" y="418" fill="#4a8a6a" font-size="10" text-anchor="middle">Jira · ServiceNow</text>
  <text x="550" y="434" fill="#4a8a6a" font-size="10" text-anchor="middle">Auto-filed · Prioritized</text>
  <text x="550" y="448" fill="#2a6a4a" font-size="9" text-anchor="middle">Finding → ticket automated</text>

  <!-- Leadership box -->
  <rect x="660" y="376" width="180" height="80" rx="6" fill="#080e12" stroke="#00e676" stroke-width="1"/>
  <text x="750" y="400" fill="#00e676" font-size="11" font-weight="bold" text-anchor="middle">LEADERSHIP / GRC</text>
  <text x="750" y="418" fill="#4a8a6a" font-size="10" text-anchor="middle">Executive summary</text>
  <text x="750" y="434" fill="#4a8a6a" font-size="10" text-anchor="middle">Board-ready risk language</text>
  <text x="750" y="448" fill="#2a6a4a" font-size="9" text-anchor="middle">No translation needed</text>

  <!-- Drop lines from pipeline to delivery -->
  <line x1="150" y1="310" x2="150" y2="374" stroke="#00e5ff" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="350" y1="310" x2="350" y2="374" stroke="#00e5ff" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="550" y1="310" x2="550" y2="374" stroke="#00e676" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="750" y1="310" x2="750" y2="374" stroke="#00e676" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Footer -->
  <text x="450" y="475" fill="#2a4a3a" font-size="10" text-anchor="middle">github.com/d0uble3L/spectra · Powered by Claude (Anthropic) · cybersecurityos.net</text>

  <!-- Bottom accent -->
  <rect x="0" y="516" width="900" height="4" fill="#00e5ff" rx="2"/>
</svg>
