<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050c1a"/>
      <stop offset="100%" stop-color="#0c1f3a"/>
    </linearGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#0e2440" stroke-width="0.8"/>
    </pattern>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c2040"/>
      <stop offset="100%" stop-color="#071428"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow -->
  <ellipse cx="300" cy="315" rx="400" ry="300" fill="#00c9e0" opacity="0.025"/>

  <!-- Top border -->
  <rect x="0" y="0" width="1200" height="4" fill="#00c9e0"/>

  <!-- Left vertical accent -->
  <rect x="82" y="108" width="4" height="392" rx="2" fill="#00c9e0"/>

  <!-- OS-WEEKLY label -->
  <rect x="106" y="108" width="130" height="24" rx="12" fill="#061e38" stroke="#00c9e0" stroke-width="1"/>
  <text x="171" y="124" text-anchor="middle" font-size="10" fill="#00c9e0" letter-spacing="2" font-weight="600">OS-WEEKLY</text>
  <text x="246" y="124" font-size="11" fill="#3d6b8c" letter-spacing="1">JUNE 28, 2026</text>

  <!-- Title -->
  <text x="106" y="198" font-size="36" font-weight="800" fill="#e8f4ff" letter-spacing="-1">A Ransomware Access</text>
  <text x="106" y="248" font-size="36" font-weight="800" fill="#e8f4ff" letter-spacing="-1">Broker, Stolen OAuth</text>
  <text x="106" y="298" font-size="36" font-weight="800" fill="#00c9e0" letter-spacing="-1">Tokens &amp; the Human Factor</text>

  <!-- Divider -->
  <rect x="106" y="322" width="420" height="2" rx="1" fill="#1a3a5a"/>

  <!-- Subtitle -->
  <text x="106" y="354" font-size="18" fill="#7aaece" letter-spacing="0.3">The fundamentals are still where breaches start</text>

  <!-- Tags -->
  <rect x="106" y="380" width="112" height="26" rx="13" fill="#051828" stroke="#f59e0b" stroke-width="1"/>
  <text x="162" y="397" text-anchor="middle" font-size="11" fill="#f59e0b" letter-spacing="0.5">Ransomware</text>

  <rect x="226" y="380" width="120" height="26" rx="13" fill="#051828" stroke="#ef4444" stroke-width="1"/>
  <text x="286" y="397" text-anchor="middle" font-size="11" fill="#ef4444" letter-spacing="0.5">OAuth Breach</text>

  <rect x="354" y="380" width="146" height="26" rx="13" fill="#051828" stroke="#10b981" stroke-width="1"/>
  <text x="427" y="397" text-anchor="middle" font-size="11" fill="#10b981" letter-spacing="0.5">Human Factor</text>

  <!-- Branding -->
  <text x="106" y="572" font-size="12" fill="#2a5678" letter-spacing="3">CYBERSECURITYOS.NET</text>
  <text x="106" y="591" font-size="11" fill="#1e3d56">CyberShield Weekly Digest</text>

  <!-- RIGHT: Headline ticker -->
  <rect x="690" y="72" width="462" height="506" rx="14" fill="url(#cardBg)" stroke="#132d4d" stroke-width="1.5"/>

  <!-- Dashboard header -->
  <rect x="690" y="72" width="462" height="50" rx="14" fill="#071428"/>
  <rect x="690" y="108" width="462" height="14" fill="#071428"/>
  <circle cx="718" cy="97" r="6" fill="#ef4444" opacity="0.6"/>
  <circle cx="738" cy="97" r="6" fill="#f59e0b" opacity="0.6"/>
  <circle cx="758" cy="97" r="6" fill="#10b981" opacity="0.6"/>
  <text x="921" y="102" text-anchor="middle" font-size="10" fill="#3d6b8c" letter-spacing="1.5">THIS WEEK'S HEADLINES</text>

  <!-- Headline 1: Mistic / KongTuke -->
  <rect x="710" y="138" width="422" height="78" rx="7" fill="#071528" stroke="#f59e0b" stroke-width="1"/>
  <rect x="710" y="138" width="4" height="78" fill="#f59e0b"/>
  <text x="726" y="158" font-size="9" fill="#f59e0b" letter-spacing="1.2" font-weight="700">RANSOMWARE ACCESS BROKER</text>
  <text x="726" y="178" font-size="14" fill="#e8f4ff" font-weight="600">Mistic Backdoor Tied to KongTuke</text>
  <text x="726" y="198" font-size="10.5" fill="#5a8aa8">Foothold malware sold on to ransomware crews</text>

  <!-- Headline 2: Salesforce / Icarus -->
  <rect x="710" y="226" width="422" height="78" rx="7" fill="#071528" stroke="#ef4444" stroke-width="1"/>
  <rect x="710" y="226" width="4" height="78" fill="#ef4444"/>
  <text x="726" y="246" font-size="9" fill="#ef4444" letter-spacing="1.2" font-weight="700">STOLEN OAUTH TOKENS</text>
  <text x="726" y="266" font-size="14" fill="#e8f4ff" font-weight="600">Salesforce Breach Scope Widens</text>
  <text x="726" y="286" font-size="10.5" fill="#5a8aa8">Klue's stolen tokens used to exfiltrate customer data</text>

  <!-- Headline 3: Scattered Spider -->
  <rect x="710" y="314" width="422" height="78" rx="7" fill="#071528" stroke="#3b82f6" stroke-width="1"/>
  <rect x="710" y="314" width="4" height="78" fill="#3b82f6"/>
  <text x="726" y="334" font-size="9" fill="#3b82f6" letter-spacing="1.2" font-weight="700">GUILTY PLEA, DAY ONE</text>
  <text x="726" y="354" font-size="14" fill="#e8f4ff" font-weight="600">Scattered Spider Members Plead Guilty</text>
  <text x="726" y="374" font-size="10.5" fill="#5a8aa8">TfL hacking trial cut short by an early plea</text>

  <!-- Headline 4: Human factor -->
  <rect x="710" y="402" width="422" height="78" rx="7" fill="#071528" stroke="#10b981" stroke-width="1"/>
  <rect x="710" y="402" width="4" height="78" fill="#10b981"/>
  <text x="726" y="422" font-size="9" fill="#10b981" letter-spacing="1.2" font-weight="700">THE HUMAN FACTOR</text>
  <text x="726" y="442" font-size="14" fill="#e8f4ff" font-weight="600">Talos on Policy vs. Practice + AI Chatbot Trust</text>
  <text x="726" y="462" font-size="10.5" fill="#5a8aa8">Why good policy still breaks down under pressure</text>

  <!-- Footer bar -->
  <rect x="710" y="490" width="422" height="70" rx="7" fill="#04101e"/>
  <text x="722" y="510" font-size="8.5" fill="#3d6b8c" letter-spacing="1.5">ALSO IN THIS ISSUE</text>
  <text x="722" y="528" font-size="10.5" fill="#4a7fa0">DoJ seizes HuiOne cloud assets over money laundering</text>
  <text x="722" y="544" font-size="10.5" fill="#4a7fa0">817 structured cybersecurity skills built for AI agents</text>
</svg>
