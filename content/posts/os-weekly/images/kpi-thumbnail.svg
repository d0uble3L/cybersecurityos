<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050c1a"/>
      <stop offset="100%" stop-color="#0c1f3a"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0e2440" stroke-width="0.7"/>
    </pattern>
  </defs>

  <rect width="800" height="420" fill="url(#bg)"/>
  <rect width="800" height="420" fill="url(#grid)"/>

  <!-- Top accent -->
  <rect x="0" y="0" width="800" height="4" fill="#00c9e0"/>

  <!-- Left bar -->
  <rect x="52" y="70" width="4" height="240" rx="2" fill="#00c9e0"/>

  <!-- OS-WEEKLY chip -->
  <rect x="72" y="70" width="106" height="22" rx="11" fill="#061e38" stroke="#00c9e0" stroke-width="1"/>
  <text x="125" y="85" text-anchor="middle" font-size="9.5" fill="#00c9e0" letter-spacing="2" font-weight="600">OS-WEEKLY</text>

  <!-- Title -->
  <text x="72" y="148" font-size="40" font-weight="800" fill="#e8f4ff" letter-spacing="-1">Security KPIs</text>
  <text x="72" y="196" font-size="40" font-weight="800" fill="#00c9e0" letter-spacing="-1">That Actually</text>
  <text x="72" y="244" font-size="40" font-weight="800" fill="#00c9e0" letter-spacing="-1">Matter</text>

  <!-- Divider -->
  <rect x="72" y="260" width="280" height="2" rx="1" fill="#1a3a5a"/>

  <!-- Subtitle -->
  <text x="72" y="290" font-size="16" fill="#7aaece">What to Report to the Board</text>

  <!-- Tags -->
  <rect x="72" y="312" width="100" height="22" rx="11" fill="#051828" stroke="#00c9e0" stroke-width="1"/>
  <text x="122" y="327" text-anchor="middle" font-size="10" fill="#00c9e0">NIST CSF 2.0</text>

  <rect x="182" y="312" width="90" height="22" rx="11" fill="#051828" stroke="#3b82f6" stroke-width="1"/>
  <text x="227" y="327" text-anchor="middle" font-size="10" fill="#3b82f6">ISO 27001</text>

  <!-- Branding -->
  <text x="72" y="388" font-size="11" fill="#1e3d56" letter-spacing="2.5">CYBERSECURITYOS.NET</text>

  <!-- Right: 4 compact KPI cards in 2x2 -->
  <!-- Card 1 -->
  <rect x="480" y="64" width="148" height="80" rx="7" fill="#071528" stroke="#132d4d" stroke-width="1"/>
  <text x="496" y="82" font-size="8" fill="#3d6b8c" letter-spacing="1.2">CYBER RISK SCORE</text>
  <text x="496" y="118" font-size="34" font-weight="700" fill="#f0f6ff">82</text>
  <text x="534" y="118" font-size="12" fill="#3d6b8c">/100</text>
  <text x="496" y="134" font-size="9.5" fill="#10b981">▲ +8 from Q1</text>

  <!-- Card 2 -->
  <rect x="640" y="64" width="132" height="80" rx="7" fill="#071528" stroke="#132d4d" stroke-width="1"/>
  <text x="656" y="82" font-size="8" fill="#3d6b8c" letter-spacing="1">MTTD (DAYS)</text>
  <text x="656" y="118" font-size="34" font-weight="700" fill="#f0f6ff">11</text>
  <text x="656" y="134" font-size="9.5" fill="#10b981">▲ Was 34</text>

  <!-- Card 3 -->
  <rect x="480" y="158" width="148" height="80" rx="7" fill="#071528" stroke="#132d4d" stroke-width="1"/>
  <text x="496" y="176" font-size="8" fill="#3d6b8c" letter-spacing="1">PATCH RATE / SLA</text>
  <text x="496" y="212" font-size="34" font-weight="700" fill="#f0f6ff">97</text>
  <text x="534" y="212" font-size="12" fill="#3d6b8c">%</text>
  <text x="496" y="228" font-size="9.5" fill="#10b981">▲ On target</text>

  <!-- Card 4 -->
  <rect x="640" y="158" width="132" height="80" rx="7" fill="#071528" stroke="#132d4d" stroke-width="1"/>
  <text x="656" y="176" font-size="8" fill="#3d6b8c" letter-spacing="1">PHISHING RATE</text>
  <text x="656" y="212" font-size="34" font-weight="700" fill="#f59e0b">6.2</text>
  <text x="704" y="212" font-size="12" fill="#3d6b8c">%</text>
  <text x="656" y="228" font-size="9.5" fill="#10b981">▲ Was 11.4%</text>

  <!-- Card 5: spanning -->
  <rect x="480" y="252" width="292" height="58" rx="7" fill="#071528" stroke="#132d4d" stroke-width="1"/>
  <text x="496" y="271" font-size="8" fill="#3d6b8c" letter-spacing="1">SECURITY POSTURE</text>
  <!-- Progress bar -->
  <rect x="496" y="278" width="260" height="9" rx="4.5" fill="#0a1e36"/>
  <rect x="496" y="278" width="213" height="9" rx="4.5" fill="#10b981"/>
  <text x="496" y="302" font-size="9.5" fill="#10b981">82% of board KPI targets met this quarter</text>

  <!-- Card 6: Priorities -->
  <rect x="480" y="324" width="292" height="72" rx="7" fill="#031410" stroke="#0c4020" stroke-width="1"/>
  <text x="496" y="343" font-size="8" fill="#6ee7b7" letter-spacing="1.2">Q3 PRIORITIES</text>
  <text x="496" y="360" font-size="10" fill="#4a7fa0">1. Close Respond/Recover NIST gap</text>
  <text x="496" y="376" font-size="10" fill="#4a7fa0">2. OT patch window (3 systems)</text>
  <text x="496" y="392" font-size="10" fill="#4a7fa0">3. Finance phishing training</text>
</svg>
