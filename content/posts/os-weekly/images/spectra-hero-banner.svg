<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480" font-family="'Courier New', Courier, monospace">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060a14"/>
      <stop offset="60%" style="stop-color:#091220"/>
      <stop offset="100%" style="stop-color:#030810"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b9eff"/>
      <stop offset="50%" style="stop-color:#a0d4ff"/>
      <stop offset="100%" style="stop-color:#3b9eff"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b9eff"/>
      <stop offset="50%" style="stop-color:#00e676"/>
      <stop offset="100%" style="stop-color:#3b9eff"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a3a6a;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </radialGradient>
    <filter id="heroGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" fill="url(#heroBg)" rx="12"/>

  <!-- Center radial glow -->
  <ellipse cx="450" cy="240" rx="380" ry="200" fill="url(#centerGlow)"/>

  <!-- Hex grid pattern (background texture) -->
  <g opacity="0.06" stroke="#3b9eff" stroke-width="0.8" fill="none">
    <!-- Row 1 -->
    <polygon points="60,40 80,28 100,40 100,64 80,76 60,64"/>
    <polygon points="100,40 120,28 140,40 140,64 120,76 100,64"/>
    <polygon points="140,40 160,28 180,40 180,64 160,76 140,64"/>
    <polygon points="760,40 780,28 800,40 800,64 780,76 760,64"/>
    <polygon points="800,40 820,28 840,40 840,64 820,76 800,64"/>
    <polygon points="840,40 860,28 880,40 880,64 860,76 840,64"/>
    <!-- Row bottom -->
    <polygon points="60,400 80,388 100,400 100,424 80,436 60,424"/>
    <polygon points="100,400 120,388 140,400 140,424 120,436 100,424"/>
    <polygon points="140,400 160,388 180,400 180,424 160,436 140,424"/>
    <polygon points="760,400 780,388 800,400 800,424 780,436 760,424"/>
    <polygon points="800,400 820,388 840,400 840,424 820,436 800,424"/>
    <!-- Scattered -->
    <polygon points="30,180 50,168 70,180 70,204 50,216 30,204"/>
    <polygon points="830,180 850,168 870,180 870,204 850,216 830,204"/>
    <polygon points="30,280 50,268 70,280 70,304 50,316 30,304"/>
    <polygon points="830,280 850,268 870,280 870,304 850,316 830,304"/>
  </g>

  <!-- Horizontal scan line effect -->
  <g opacity="0.04">
    <rect x="0" y="60" width="900" height="1" fill="#3b9eff"/>
    <rect x="0" y="120" width="900" height="1" fill="#3b9eff"/>
    <rect x="0" y="180" width="900" height="1" fill="#3b9eff"/>
    <rect x="0" y="240" width="900" height="1" fill="#3b9eff"/>
    <rect x="0" y="300" width="900" height="1" fill="#3b9eff"/>
    <rect x="0" y="360" width="900" height="1" fill="#3b9eff"/>
    <rect x="0" y="420" width="900" height="1" fill="#3b9eff"/>
  </g>

  <!-- Top accent bar gradient -->
  <rect x="0" y="0" width="900" height="4" fill="url(#accentBar)" rx="2"/>

  <!-- Left vertical accent -->
  <rect x="0" y="4" width="3" height="472" fill="#3b9eff" opacity="0.6"/>
  <!-- Right vertical accent -->
  <rect x="897" y="4" width="3" height="472" fill="#3b9eff" opacity="0.6"/>

  <!-- Top-left corner bracket -->
  <path d="M 20 30 L 20 20 L 30 20" stroke="#3b9eff" stroke-width="2" fill="none" opacity="0.8"/>
  <!-- Top-right corner bracket -->
  <path d="M 880 20 L 870 20 M 880 20 L 880 30" stroke="#3b9eff" stroke-width="2" fill="none" opacity="0.8"/>
  <!-- Bottom-left corner bracket -->
  <path d="M 20 450 L 20 460 L 30 460" stroke="#3b9eff" stroke-width="2" fill="none" opacity="0.8"/>
  <!-- Bottom-right corner bracket -->
  <path d="M 870 460 L 880 460 L 880 450" stroke="#3b9eff" stroke-width="2" fill="none" opacity="0.8"/>

  <!-- Status line top -->
  <text x="36" y="18" fill="#2a5a7a" font-size="9" letter-spacing="1">[ CYBERSECURITYOS.NET ]</text>
  <text x="700" y="18" fill="#2a5a7a" font-size="9" letter-spacing="1">OS-WEEKLY // 2026-05-10</text>

  <!-- Main SPECTRA title -->
  <text x="450" y="178" fill="url(#titleGrad)" font-size="96" font-weight="bold" text-anchor="middle" letter-spacing="18" filter="url(#heroGlow)">SPECTRA</text>

  <!-- Subtitle divider line -->
  <line x1="200" y1="198" x2="700" y2="198" stroke="#3b9eff" stroke-width="0.8" opacity="0.5"/>

  <!-- Full name -->
  <text x="450" y="222" fill="#5a8faa" font-size="11" text-anchor="middle" letter-spacing="3">Security Platform for Expert-level Correlation, Triage, and Risk Analysis</text>

  <!-- Tagline -->
  <text x="450" y="262" fill="#d4ecff" font-size="18" text-anchor="middle" letter-spacing="1" filter="url(#softGlow)">AI-Powered Vulnerability Triage.</text>
  <text x="450" y="288" fill="#d4ecff" font-size="18" text-anchor="middle" letter-spacing="1">Analyst-Grade Intelligence. At Scale.</text>

  <!-- Powered by badge -->
  <rect x="352" y="308" width="196" height="28" rx="14" fill="#0a1a30" stroke="#3b9eff" stroke-width="1"/>
  <text x="450" y="327" fill="#3b9eff" font-size="11" text-anchor="middle" letter-spacing="1">⚡ Powered by Claude · Anthropic</text>

  <!-- Bottom capability pills -->
  <g>
    <!-- Pill 1 -->
    <rect x="62" y="370" width="140" height="30" rx="15" fill="#0a1a2a" stroke="#3b9eff" stroke-width="1"/>
    <text x="132" y="390" fill="#7ab3cc" font-size="10" text-anchor="middle">Attack Chain Analysis</text>

    <!-- Pill 2 -->
    <rect x="220" y="370" width="130" height="30" rx="15" fill="#0a1a2a" stroke="#3b9eff" stroke-width="1"/>
    <text x="285" y="390" fill="#7ab3cc" font-size="10" text-anchor="middle">Severity Calibration</text>

    <!-- Pill 3 -->
    <rect x="368" y="370" width="164" height="30" rx="15" fill="#0a2010" stroke="#00e676" stroke-width="1"/>
    <text x="450" y="390" fill="#7ac89a" font-size="10" text-anchor="middle">Trivy · Semgrep · Nessus</text>

    <!-- Pill 4 -->
    <rect x="550" y="370" width="130" height="30" rx="15" fill="#0a1a2a" stroke="#3b9eff" stroke-width="1"/>
    <text x="615" y="390" fill="#7ab3cc" font-size="10" text-anchor="middle">Exec Summaries</text>

    <!-- Pill 5 -->
    <rect x="698" y="370" width="140" height="30" rx="15" fill="#0a1a2a" stroke="#3b9eff" stroke-width="1"/>
    <text x="768" y="390" fill="#7ab3cc" font-size="10" text-anchor="middle">~90% Cost Reduction</text>
  </g>

  <!-- Bottom status line -->
  <text x="450" y="448" fill="#2a4a5a" font-size="10" text-anchor="middle" letter-spacing="1">github.com/d0uble3L/spectra · Open Source · Python 3.9+</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="476" width="900" height="4" fill="url(#accentBar)" rx="2"/>
</svg>
