name: CI

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run markdownlint
        run: npm run lint:md

  hugo-build:
    name: Hugo Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.160.1'
          extended: true
      - name: Build site with Hugo
        env:
          HUGO_ENV: production
        run: hugo --minify --gc
      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --root-dir ./public './public/**/*.html'
          fail: true
